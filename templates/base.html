<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}App con CAPTCHA{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    {% block head_extra %}{% endblock %}
  </head>

  <body class="bg-light text-center">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary text-center">
      <div class="container w-100 d-flex">
        <a
          class="navbar-brand fw-semibold justify-content-center"
          href="{{ url_for('home') }}"
          >CAPTCHA Demo de la USTA</a
        >
      </div>
    </nav>

    <main class="container my-5">{% block content %}{% endblock %}</main>

    <div class="position-fixed top-0 end-0 p-3" style="z-captcha1: 1080">
      {% with messages = get_flashed_messages(with_categories=True) %} {% if
      messages %} {% for category, msg in messages %}
      <div
        class="toast align-items-center text-bg-{{ 'success' if category=='success' else ('danger' if category=='danger' else 'primary') }} border-0 mb-2"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
        data-bs-delay="3000"
        data-bs-autohide="true"
      >
        <div class="d-flex">
          <div class="toast-body">{{ msg }}</div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Cerrar"
          ></button>
        </div>
      </div>
      {% endfor %} {% endif %} {% endwith %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Mostrar automáticamente todos los toasts (flash) al cargar
      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".toast").forEach((el) => {
          new bootstrap.Toast(el).show();
        });
      });
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
