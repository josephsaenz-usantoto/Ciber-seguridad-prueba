{% extends "base.html" %} {% block title %}CAPTCHA de Secuencia Lógica{%
endblock %} {% block content %}
<div class="row justify-content-center g-4">
  <div class="col-12 col-md-8">
    <div class="card h-100 shadow-sm">
      <div class="card-body d-flex flex-column">
        <h2 class="h5">CAPTCHA de Secuencia Lógica</h2>
        <p class="text-muted mb-4">
          Ordena los días de la semana en el orden correcto para continuar.
        </p>

        <form
          action="{{ url_for('captcha4') }}"
          method="post"
          class="d-flex flex-column"
        >
          <div id="sortable-list" class="list-group mb-4" style="cursor: grab">
            {% for dia in dias %}
            <div
              class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
              draggable="true"
            >
              {{ dia }}
              <input type="hidden" name="dias[]" value="{{ dia }}" />
            </div>
            {% endfor %}
          </div>
          <div class="mt-auto">
            <button type="submit" class="btn btn-primary w-100">
              Verificar Secuencia
            </button>
          </div>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('home') }}" class="small">Volver</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Script para gestionar el arrastre y soltado de los elementos de la lista
  const sortableList = document.getElementById("sortable-list");
  let draggedItem = null;

  sortableList.addEventListener("dragstart", (e) => {
    draggedItem = e.target;
    setTimeout(() => {
      e.target.style.opacity = "0.5";
    }, 0);
  });

  sortableList.addEventListener("dragend", (e) => {
    setTimeout(() => {
      e.target.style.opacity = "";
      draggedItem = null;
    }, 0);
  });

  sortableList.addEventListener("dragover", (e) => {
    e.preventDefault();
    const afterElement = getDragAfterElement(sortableList, e.clientY);
    if (afterElement == null) {
      sortableList.appendChild(draggedItem);
    } else {
      sortableList.insertBefore(draggedItem, afterElement);
    }
  });

  function getDragAfterElement(container, y) {
    const draggableElements = [
      ...container.querySelectorAll(".list-group-item:not(.dragging)"),
    ];

    return draggableElements.reduce(
      (closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      },
      { offset: Number.NEGATIVE_INFINITY }
    ).element;
  }
</script>
{% endblock %}
